<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
		<title>DaveTracker // Mind Virus Interface</title>

		<link rel="stylesheet" href="/style.css" />
	</head>
	<body>
		<div class="container">
			<header>
				<h1>DAVE<span class="glitch">TRACKER</span></h1>
				<div class="subtitle">COGNITIVE INFECTION MONITOR</div>
			</header>

			<section class="panel">
				<div class="field">
					<label>
						Alias:
						<input id="userName" type="text" value="Dave" maxlength="64" style="width:200px;">
						<button id="setIdBtn">Set</button>
					</label>
				</div>

				<div class="field">
					<span class="label">DavID</span>
					<span id="userId" class="value">?</span>
				</div>

				<div class="field">
					<span class="label">STATUS</span>
					<span id="state" class="value infected"></span>
				</div>

				<div class="field">
					<span class="label">INFECTIONS SPREAD</span>
					<span id="infectedCount" class="value">0</span>
				</div>

				<div class="field">
					<span class="label">FRAGMENTS COLLECTED</span>
					<span id="fragments" class="value">0</span>
				</div>

				<div class="field">
					<span class="label">DAVES ONLINE</span>
					<span id="total" class="value">0</span>
				</div>

			</section>

			<section class="panel">
				<button id="infectBtn">INITIATE TRANSMISSION</button>
				<button id="stabilizeBtn">STABILIZE HOST</button>
				<button id="spawnCluster">SPAWN CLUSTER</button>
			</section>

			<section class="panel">
				<!-- Leaflet CSS & JS -->
				<link
						rel="stylesheet"
						href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
						/>
				<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


				<div class="label">LOCAL NETWORK MAP</div>
				<div id="map" class="map"></div>
			</section>

			<section class="log">
				<div class="log-title">EVENT LOG</div>
				<ul id="logList"></ul>
			</section>

			<section class="log">
				<div class="log-title">DAVES</div>
				<ul id="distanceList"></ul>
			</section>


		</div>

		<script src="/socket.io/socket.io.js"></script>
		<script type="module" src="./app.js"></script>

	</body>
</html>
