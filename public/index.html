<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
		<title>DaveTracker // Mind Virus Interface</title>

		<link rel="stylesheet" href="/style.css" />
	</head>
	<body>
		<div class="container">
			<header>
				<h1>DAVE<span class="glitch">TRACKER</span></h1>
				<div class="subtitle">COGNITIVE INFECTION MONITOR</div>
			</header>

			<section class="panel">
				<div class="field">
					<label for="userName">Alias:</label>
					<div class="input-row">
						<input id="userName" type="text" value="Dave" maxlength="64">
						<button id="setIdBtn">Set</button>
					</div>
				</div>

				<div class="field">
					<span class="label">DavID</span>
					<span id="userId" class="value">?</span>
				</div>

				<div class="field">
					<span class="label">STATUS</span>
					<span id="state" class="value infected"></span>
				</div>

				<br />

				<div class="field">
					<span class="label">☣️ INFECTIONS SPREAD</span>
					<span id="infectedCount" class="value">0</span>
				</div>

				<div class="field">
					<span class="label">🧬 FRAGMENTS</span>
					<span id="fragments" class="value">0</span>
				</div>

				<button id="install-antivirus">
					INSTALL MIND ANTIVIRUS
				</button>
			</section>


			<section class="panel">
				<!-- Leaflet CSS & JS -->
				<link
						rel="stylesheet"
						href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
						/>
				<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


				<div class="label">LOCAL NETWORK MAP</div>
				<div id="map" class="map"></div>
				<button id="centerMe">Center on Me</button>
			</section>

			<section class="log daves-online">
				<div class="log-title">
				<span>DAVES ONLINE</span>
				<span id="total" class="value">0</span>
				</div>
				<ul id="distanceList"></ul>

				<br />
				<a id="leaderboardLink" href="/leaderboard.html" style="
					 color: #5cff9d;
					 text-decoration: none;
					 font-family: ui-monospace, monospace;
					 ">
					View Leaderboard
				</a>


			</section>

			<section class="log nodes">
				<div class="log-title">
				<span>NODES</span>
				<span id="totalNodes" class="value">0</span>
				</div>
				<ul id="nodeDistanceList"></ul>
				<br />
				<a id="nodeLink" href="/nodes.html" style="
					 color: #5cff9d;
					 text-decoration: none;
					 font-family: ui-monospace, monospace;
					 ">
					View all nodes
				</a>

			</section>

			<section class="log event-log">
				<div class="log-title">EVENT LOG</div>
				<ul id="logList"></ul>
			</section>


		</div>

		<script src="/socket.io/socket.io.js"></script>
		<script type="module" src="./app.js"></script>
	</body>
</html>
