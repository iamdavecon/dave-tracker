<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DaveTracker Leaderboard</title>
  <link rel="stylesheet" href="/style.css">

  <style>
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #0b0b0f;
      color: #e5e5e5;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 16px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111118;
      border: 1px solid #222;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #222;
      text-align: left;
    }

    th {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
    }

    tr:hover {
      background: #1a1a24;
    }

    .rank { width: 60px; color: #888; }
    .score { font-weight: bold; }

    .virus { color: #ff5c5c; }
    .antivirus { color: #5cff9d; }

    .name-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tag-icons {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      white-space: nowrap;
    }

    .tag-icon {
      font-size: 16px;
      line-height: 1;
    }

    .state {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #2a2a2a;
      color: #aaa;
      display: inline-block;
    }

    /* dominance styling */
    .row-virus {
      background: rgba(255, 92, 92, 0.07);
    }

    .row-antivirus {
      background: rgba(92, 255, 157, 0.07);
    }

    .row-balanced {
      background: rgba(255, 255, 255, 0.03);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .small {
      color: #666;
      font-size: 12px;
    }

    /* summary panel */
    #summary {
      margin-bottom: 20px;
      padding: 14px;
      background: #111118;
      border: 1px solid #222;
    }

    .summary-grid {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .summary-left div {
      margin-bottom: 4px;
    }

    .summary-status {
      color: #888;
      text-align: right;
      max-width: 300px;
    }

    #stateSummary {
      margin-top: 16px;
      padding: 14px;
      background: #111118;
      border: 1px solid #222;
    }

    .state-summary-title {
      margin-bottom: 10px;
      color: #888;
      font-size: 12px;
      text-transform: uppercase;
    }

    .state-summary-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .state-summary-item {
      gap: 6px;
      font-size: 12px;
    }

    .state-summary-count {
      font-weight: bold;
    }

    .row-in-range {
      box-shadow: inset 4px 0 0 #5fced1;
    }

    .row-linked {
      box-shadow: inset 4px 0 0 #f6c85f;
    }

    .row-in-range.row-linked {
      box-shadow:
        inset 4px 0 0 #5fced1,
        inset 8px 0 0 #f6c85f;
    }

  </style>
</head>

<body>
  <div class="container">
    <a href="/" class="back-link">< Back</a>


    <div class="header">
      <h1>DaveTracker Leaderboard</h1>
      <div class="small" id="updated"></div>
    </div>

    <!-- SERVER SUMMARY -->
    <div id="summary"></div>

    <table>
      <thead>
        <tr>
          <th class="rank">Rank</th>
          <th>Name</th>
          <th>Score</th>
          <th>Infected</th>
          <th>Ascended</th>
          <th>State</th>
        </tr>
      </thead>

      <tbody id="rows"></tbody>
    </table>

    <div id="stateSummary"></div>

  </div>

  <script type="module">
	  import { getTagMetadata } from "/utils/tags.js";

	  const STATE_ORDER = [
		    "DAVEPRIME",
		    "DOPE",
		    "ASCENDED",
		    "RESONANT",
		    "IMMUNE",
		    "UNSTABLE",
		    "INFECTED",
		    "CORRUPTED"
	    ];


	  function appendTextCell(tr, text, className = "") {
		    const td = document.createElement("td");
		    td.textContent = text;
		    if (className) td.className = className;
		    tr.appendChild(td);
	    }

	  function appendNameCell(tr, row) {
		    const td = document.createElement("td");
		    const wrapper = document.createElement("span");
		    wrapper.className = "name-cell";

		    const name = document.createElement("span");
		    name.textContent = row.name || "unknown";
		    wrapper.appendChild(name);

		    const tags = Array.isArray(row.tags) ? row.tags : [];
		    const knownTags = tags
			    .map(tag => getTagMetadata(tag))
			    .filter(Boolean);

		    if (knownTags.length > 0) {
			      const tagIcons = document.createElement("span");
			      tagIcons.className = "tag-icons";

			      knownTags.forEach(tag => {
				        const icon = document.createElement("span");
				        icon.className = "tag-icon";
				        icon.textContent = tag.emoji;
				        icon.title = tag.title ?? tag.label;
				        icon.setAttribute("aria-label", tag.title ?? tag.label);
				        tagIcons.appendChild(icon);
			        });

			      wrapper.appendChild(tagIcons);
		      }

		    td.appendChild(wrapper);
		    tr.appendChild(td);
	    }

	  function renderStateSummary(leaderboard) {
		    const stateSummary = document.getElementById("stateSummary");
		    stateSummary.innerHTML = "";

		    const counts = leaderboard.reduce((acc, row) => {
			      const currentState = row.state || "UNKNOWN";
			      acc[currentState] = (acc[currentState] || 0) + 1;
			      return acc;
		      }, {});

		    const title = document.createElement("div");
		    title.className = "state-summary-title";
		    title.textContent = `State Summary (${leaderboard.length} Daves)`;
		    stateSummary.appendChild(title);

		    const list = document.createElement("div");
		    list.className = "state-summary-list";

		    const orderedStates = [
			      ...STATE_ORDER.slice().reverse(),
			      ...Object.keys(counts)
				        .filter(currentState => !STATE_ORDER.includes(currentState))
				        .sort()
		      ];

		    orderedStates
			      .filter(currentState => counts[currentState] > 0)
			      .forEach(currentState => {
				        const item = document.createElement("span");
				        item.className = `state-summary-item pill ${currentState.toLowerCase()}`;

				        const label = document.createElement("span");
				        label.textContent = currentState;

				        const count = document.createElement("span");
				        count.className = "state-summary-count";
				        count.textContent = counts[currentState];

				        item.appendChild(label);
				        item.appendChild(count);
				        list.appendChild(item);
			        });

		    stateSummary.appendChild(list);
	    }

	  async function loadLeaderboard() {
			    const params = new URLSearchParams(window.location.search);
			    const myUserId = params.get("userId");

			    const res = await fetch(`/api/leaderboard?viewerId=${encodeURIComponent(myUserId || "")}`);
			    const payload = await res.json();

			    const { summary, leaderboard } = payload;

			    // ---------------- SUMMARY ----------------
			    const virus = summary.totalVirus || 0;
			    const antivirus = summary.totalAntivirus || 0;

			    let statusText = "Balanced conflict";
			    if (virus > antivirus) statusText = "Virus is currently dominating the system";
			    else if (antivirus > virus) statusText = "DaveCon ascendency is on the rise";

			    document.getElementById("summary").innerHTML = `
			 <div class="summary-grid">
			 <div class="summary-left">
			 <div class="virus">Total Virus Influence: ${virus}</div>
			 <div class="antivirus">Total DaveCon Control: ${antivirus}</div>
		 </div>

		 <div class="summary-status">
			 ${statusText}
		 </div>
	 </div>
	 `;

			    // ---------------- TABLE ----------------
			    const tbody = document.getElementById("rows");
			    tbody.innerHTML = "";
			    leaderboard.forEach(row => {
					      const tr = document.createElement("tr");

					      const v = row.teamVirus || 0;
					      const a = row.teamAntivirus || 0;

					      let rowClass = "row-balanced";
					      if (v > a) rowClass = "row-virus";
					      else if (a > v) rowClass = "row-antivirus";

					      // ?? highlight me
					      if (row.userId === myUserId) {
								rowClass += " row-me";
							}
					      if (row.inRange) {
								rowClass += " row-in-range";
							}
					      if (row.linked) {
								rowClass += " row-linked";
							}

					      tr.className = rowClass + " clickable-row";

					      appendTextCell(tr, `#${row.rank}`, "rank");
					      appendNameCell(tr, row);
					      appendTextCell(tr, row.score, "score");
					      appendTextCell(tr, v, "virus");
					      appendTextCell(tr, a, "antivirus");

					      const stateCell = document.createElement("td");
					      const state = document.createElement("span");
					      state.className = "state";
					      state.textContent = row.state || "unknown";
					      stateCell.appendChild(state);
					      tr.appendChild(stateCell);

					      tr.addEventListener("click", () => {
								window.location.href = `/player.html?id=${encodeURIComponent(row.userId)}&viewerId=${encodeURIComponent(myUserId)}`;
							});

					      tbody.appendChild(tr);
				      });




			    renderStateSummary(leaderboard);

			    document.getElementById("updated").textContent =
				    "updated " + new Date().toLocaleTimeString();
		    }

    loadLeaderboard();
    setInterval(loadLeaderboard, 3000);
  </script>

</body>
</html>
