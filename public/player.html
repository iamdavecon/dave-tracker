<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Player</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<div id="daveRaveOverlay" class="dave-rave-overlay hidden" aria-hidden="true">
		<div class="rave-ring ring-one"></div>
		<div class="rave-ring ring-two"></div>
		<div class="rave-ring ring-three"></div>
		<div class="rave-burst">
			<span>DAVE RAVE</span>
			<span>▧ ▨ ▧</span>
		</div>
		<div class="rave-confetti c1"></div>
		<div class="rave-confetti c2"></div>
		<div class="rave-confetti c3"></div>
		<div class="rave-confetti c4"></div>
		<div class="rave-confetti c5"></div>
		<div class="rave-confetti c6"></div>
	</div>
	<div class="container">
		<a href="/" class="back-link">< Back</a>
		<section class="panel">
			<div class="player-title-row">
				<div id="playerName" class="player-name">Loading...</div>
				<span class="googly-eyes player-googly-eyes" aria-hidden="true">
					<span class="googly-eye"></span>
					<span class="googly-eye"></span>
				</span>
			</div>
			<div id="playerState" class="state-pill"></div>
			<div id="player-tags" class="tag-container"></div>
			<div id="adminMeta" class="admin-meta hidden"></div>
			<div id="stats"></div>
			<div id="linkedDaves"></div>
		</section>
		<section class="panel">
			<div id="actions"></div>
			<div id="actionStatus" class="field-note"></div>
		</section>
		<section id="qrPanel" class="panel qr-panel hidden">
			<div class="section-title">Dave Link</div>
			<a id="qrLink" class="qr-link" href="/link.html">
				<img id="playerQrCode" class="qr-code" alt="QR code for this Dave">
			</a>
			<div id="qrUrl" class="qr-url"></div>
		</section>

		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
		/>

		<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
		<div id="mapArea" class="player-map-area">
			<div id="map" class="player-map"></div>
			<div id="visibilityMapAction" class="visibility-map-action hidden">
				<button id="showOnMapBtn" type="button" data-action="showMe">Show Me</button>
			</div>
		</div>

		<br/><br/>
		<section class="log">
			<ul id="logList"></ul>
		</section>
	</div>

	<script src="/socket.io/socket.io.js"></script>
	<script type="module" src="player.js"></script>
</body>
</html>
